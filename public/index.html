<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Chat Backend</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #111a2b;
        --text: #eaf1ff;
        --muted: #9eb1d1;
        --accent: #39d98a;
        --danger: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top left, #13203a, var(--bg) 55%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(860px, 100%);
        background: linear-gradient(180deg, #131f35, var(--panel));
        border: 1px solid #22355b;
        border-radius: 16px;
        padding: 28px;
        box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 3vw, 2rem);
      }

      p {
        color: var(--muted);
        line-height: 1.55;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 18px 0 24px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        background: var(--accent);
        color: #081012;
      }

      .secondary {
        background: #1b2a45;
        color: var(--text);
        border: 1px solid #2f456f;
      }

      pre {
        margin: 0;
        background: #0a1322;
        border: 1px solid #213352;
        border-radius: 10px;
        padding: 12px;
        color: #d5e4ff;
        overflow-x: auto;
      }

      .ok {
        color: var(--accent);
      }

      .bad {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Secure Chat Backend</h1>
      <p>
        This local site confirms your Vercel backend is running. Use the button below to verify health and then test
        secured endpoints with valid authorization headers.
      </p>

      <div class="row">
        <button class="primary" id="healthBtn">Check /api/health</button>
        <button class="secondary" id="clearBtn">Clear Output</button>
      </div>

      <pre id="output">Ready.</pre>
    </main>

    <script>
      const output = document.getElementById("output");
      const healthBtn = document.getElementById("healthBtn");
      const clearBtn = document.getElementById("clearBtn");

      healthBtn.addEventListener("click", async () => {
        output.textContent = "Checking...";
        try {
          const res = await fetch("/api/health");
          const contentType = res.headers.get("content-type") || "";
          const body = contentType.includes("application/json")
            ? await res.json()
            : await res.text();
          const statusClass = res.ok ? "ok" : "bad";
          const renderedBody = typeof body === "string" ? body : JSON.stringify(body, null, 2);
          output.innerHTML = `<span class="${statusClass}">HTTP ${res.status}</span>\n${renderedBody}`;
        } catch (err) {
          output.innerHTML = `<span class="bad">Request failed</span>\n${String(err)}`;
        }
      });

      clearBtn.addEventListener("click", () => {
        output.textContent = "Ready.";
      });
    </script>
  </body>
</html>
